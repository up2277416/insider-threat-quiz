<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Not to Be an Insider Threat - Security Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            padding: 30px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        #question-container {
            margin-bottom: 20px;
        }
        #question {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .option-btn {
            display: block;
            width: 100%;
            background-color: #ecf0f1;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            padding: 10px 15px;
            margin-bottom: 10px;
            font-size: 1em;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .option-btn:hover {
            background-color: #d5dbdb;
        }
        .option-btn.correct {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        #feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            font-weight: 500;
        }
        .feedback-correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .feedback-wrong {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #next-btn, #restart-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            margin-top: 20px;
            width: 100%;
        }
        #next-btn:hover, #restart-btn:hover {
            background-color: #2980b9;
        }
        #score-container {
            text-align: center;
            display: none;
        }
        #progress {
            text-align: right;
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Security Training: Insider Threats</h1>
    
    <div id="quiz-block">
        <div id="progress">Question 1 of 15</div>
        <div id="question-container">
            <div id="question">Question text goes here</div>
            <div id="options">
                </div>
        </div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="score-container">
        <h2>Training Complete!</h2>
        <p id="final-score">You scored 0 out of 15.</p>
        <p id="score-message"></p>
        <button id="restart-btn" onclick="restartQuiz()">Retake Quiz</button>
    </div>
</div>

<script>
    const quizData = [
        {
            question: "What is the Main difference between a malicious insider and a negligent insider?",
            options: [
                "A malicious insider acts intentionally to harm the organization, while a negligent insider causes harm through carelessness or human error.",
                "A malicious insider is an external hacker, while a negligent insider is an employee.",
                "A negligent insider always uses advanced hacking techniques, while a malicious insider relies on social engineering.",
                "There is no difference; both terms refer to employees who accidentally compromise data."
            ],
            correctIndex: 0,
            rationale: "Malicious insiders are driven by grievances or financial gain, whereas negligent insiders simply fail to follow proper security practices."
        },
        {
            question: "Which of the following is a common sign of an unintentional insider threat?",
            options: [
                "Intentionally selling customer data to a competitor.",
                "Leaving a workstation unlocked while grabbing a coffee.",
                "Writing a custom script to bypass the company's firewall.",
                "Escalating privileges to access payroll records."
            ],
            correctIndex: 1,
            rationale: "This is a classic example of negligence where an employee accidentally leaves systems vulnerable without malicious intent."
        },
        {
            question: "You receive an email claiming to be from IT asking you to urgently reset your password using a provided link. What should you do first?",
            options: [
                "Click the link immediately.",
                "Reply to the sender and ask for their employee ID.",
                "Verify the request with IT or report the email.",
                "Click the link but enter a fake password to see what happens."
            ],
            correctIndex: 2,
            rationale: "Reporting suspicious emails allows security teams to investigate and block the threat safely without risking credential exposure."
        },
        {
            question: "To save time, an employee uses a free, unapproved online tool to convert a highly confidential financial report from PDF to Word. What type of threat does this represent?",
            options: [
                "A malicious insider threat, as they are intentionally trying to leak the data.",
                "A negligent insider threat (Shadow IT), as uploading sensitive data to unvetted third-party services exposes it to unauthorized access.",
                "No threat at all, because the tool is free and publicly available.",
                "An external threat, because the tool is hosted on the internet."
            ],
            correctIndex: 1,
            rationale: "Using unapproved software or services (Shadow IT) for convenience often strips away company security controls, resulting in accidental data exposure."
        },
        {
            question: "What does the principle of 'least privilege' mean in the context of preventing insider threats?",
            options: [
                "All employees should have access to the same resources to promote teamwork.",
                "Employees are only granted access to the specific data and systems necessary to perform their job duties.",
                "Executives are granted access to all company data regardless of their role.",
                "Administrative privileges are given to the newest employees so they can learn the systems faster."
            ],
            correctIndex: 1,
            rationale: "Restricting access limits the potential damage an insider can cause, whether their actions are malicious or accidental."
        },
        {
            question: "While waiting for a flight, an employee connects to the airport's free, public Wi-Fi to check company emails without turning on their VPN. Why is this a security risk?",
            options: [
                "Public Wi-Fi networks are incredibly slow and will decrease productivity.",
                "Public Wi-Fi networks are often unsecured, allowing cybercriminals on the same network to intercept unencrypted data or capture login credentials.",
                "The airport might charge the company for the bandwidth used.",
                "It violates physical security policies regarding public spaces."
            ],
            correctIndex: 1,
            rationale: "Working on public networks without a Virtual Private Network (VPN) is a form of negligence that easily exposes corporate traffic to snooping."
        },
        {
            question: "A colleague you don't know well asks to 'borrow' your access badge because they forgot theirs. What is the most secure response?",
            options: [
                "Let them use your badge but only if they promise to return it in 5 minutes.",
                "Refuse the request and politely direct them to the security desk to obtain a temporary badge.",
                "Scan your badge and hold the door open for them so they don't need to borrow it.",
                "Give them your badge and take the rest of the day off."
            ],
            correctIndex: 1,
            rationale: "This enforces proper physical security protocols and ensures access is properly logged and authorized."
        },
        {
            question: "An HR manager is emailing a list of employee salaries to the CFO, but accidentally selects a similar-sounding name from their email auto-complete list, sending it to an external vendor instead. This is an example of:",
            options: [
                "A malicious data breach.",
                "A negligent insider threat caused by human error and lack of attention to detail.",
                "A system failure that IT needs to fix.",
                "A targeted social engineering attack."
            ],
            correctIndex: 1,
            rationale: "Misdirected emails due to auto-complete or simply rushing are one of the most common ways sensitive data is accidentally leaked by employees."
        },
        {
            question: "Why is a 'clean desk policy' effective in mitigating insider threats?",
            options: [
                "It ensures that the cleaning staff has an easier time sanitizing workstations.",
                "It minimizes the risk of unauthorized personnel viewing or stealing sensitive physical documents left out in the open.",
                "It requires all employees to regularly format their hard drives to keep them clean.",
                "It mandates that all office plants be removed to reduce allergens."
            ],
            correctIndex: 1,
            rationale: "Securing physical documents prevents opportunistic data theft by malicious insiders or casual observation by unauthorized individuals."
        },
        {
            question: "An employee uses the exact same password for their corporate network account as they do for their personal online gaming account. Why does this create an insider threat vulnerability?",
            options: [
                "The gaming company will be able to log into the corporate network.",
                "It violates the rule against playing games on company time.",
                "If the gaming site is breached, cybercriminals can use the stolen 'credential pair' to effortlessly access the employee's corporate accounts.",
                "It makes the password too easy for the employee to remember."
            ],
            correctIndex: 2,
            rationale: "Password reuse is a severe negligent behavior. A breach on a low-security personal site can instantly compromise high-security corporate systems."
        },
        {
            question: "Which scenario represents a potential malicious insider threat indicator?",
            options: [
                "An employee downloading a large volume of confidential files to a personal external hard drive right before submitting their resignation.",
                "A new hire asking for access to a shared folder necessary for their first project.",
                "An employee locking their computer screen every time they step away from their desk.",
                "A team member accidentally deleting a draft document and requesting it be restored from a backup."
            ],
            correctIndex: 0,
            rationale: "This is a classic indicator of a malicious insider attempting to steal intellectual property or sensitive data before leaving."
        },
        {
            question: "An employee accidentally leaves their unencrypted company USB drive on a table at a coffee shop. What is the primary concern?",
            options: [
                "The employee will have to pay to replace the physical drive.",
                "Anyone who finds the drive can simply plug it in and immediately access all the confidential company data stored on it.",
                "The USB drive might get infected with a virus from the coffee shop table.",
                "The coffee shop will sell the drive to a competitor."
            ],
            correctIndex: 1,
            rationale: "Losing physical storage devices that lack encryption is a prime example of negligence leading to a total compromise of the data held within."
        },
        {
            question: "How does using multi-factor authentication (MFA) help protect against insider threats?",
            options: [
                "It ensures that employees only use passwords that are extremely long and complex.",
                "It encrypts all the data stored on an employee's local hard drive.",
                "It requires users to provide two or more verification factors to gain access, making it harder for compromised credentials to be used alone.",
                "It monitors employee internet traffic and blocks access to malicious websites."
            ],
            correctIndex: 2,
            rationale: "Even if an insider steals or accidentally leaks a password, they (or an external attacker) cannot easily access the system without the second factor."
        },
        {
            question: "You notice a coworker frequently accessing files outside their department's scope that contain sensitive customer data. What is the best course of action?",
            options: [
                "Confront the coworker aggressively and demand to know why they are looking at the data.",
                "Ignore it, as it is likely a system glitch or they were just curious.",
                "Privately and promptly report your observations to your manager or the designated information security team.",
                "Copy the files they were accessing so you have proof of their actions."
            ],
            correctIndex: 2,
            rationale: "This allows trained professionals to investigate the anomaly securely and confidentially."
        },
        {
            question: "Which of the following actions is an example of an unintentional insider threat regarding data sharing?",
            options: [
                "Emailing a highly confidential financial report to a personal email address to finish working on it over the weekend.",
                "Using a secure, company-approved file transfer service to share a document with an authorized client.",
                "Reporting a lost company smartphone to the IT helpdesk immediately.",
                "Encrypting a sensitive file before saving it to the company's shared cloud storage."
            ],
            correctIndex: 0,
            rationale: "This exposes sensitive data to unsecured personal networks and email providers, representing a significant negligent risk."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const progressEl = document.getElementById('progress');
    const quizBlock = document.getElementById('quiz-block');
    const scoreContainer = document.getElementById('score-container');
    const finalScoreEl = document.getElementById('final-score');
    const scoreMessageEl = document.getElementById('score-message');

    function loadQuestion() {
        answered = false;
        const currentQuizData = quizData[currentQuestionIndex];
        
        progressEl.innerText = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
        questionEl.innerText = currentQuizData.question;
        optionsEl.innerHTML = '';
        feedbackEl.style.display = 'none';
        nextBtn.style.display = 'none';

        currentQuizData.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('option-btn');
            button.onclick = () => selectAnswer(index, button);
            optionsEl.appendChild(button);
        });
    }

    function selectAnswer(selectedIndex, selectedButton) {
        if (answered) return; 
        answered = true;

        const currentQuizData = quizData[currentQuestionIndex];
        const buttons = optionsEl.querySelectorAll('.option-btn');

        if (selectedIndex === currentQuizData.correctIndex) {
            selectedButton.classList.add('correct');
            score++;
            showFeedback(true, currentQuizData.rationale);
        } else {
            selectedButton.classList.add('wrong');
            buttons[currentQuizData.correctIndex].classList.add('correct');
            showFeedback(false, currentQuizData.rationale);
        }

        buttons.forEach(btn => btn.style.cursor = 'default');
        
        if (currentQuestionIndex < quizData.length - 1) {
            nextBtn.innerText = "Next Question";
        } else {
            nextBtn.innerText = "Finish Training";
        }
        nextBtn.style.display = 'block';
    }

    function showFeedback(isCorrect, rationale) {
        feedbackEl.style.display = 'block';
        if (isCorrect) {
            feedbackEl.innerHTML = `<strong>Correct!</strong><br>${rationale}`;
            feedbackEl.className = 'feedback-correct';
        } else {
            feedbackEl.innerHTML = `<strong>Incorrect.</strong><br>${rationale}`;
            feedbackEl.className = 'feedback-wrong';
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        quizBlock.style.display = 'none';
        scoreContainer.style.display = 'block';
        document.getElementById('restart-btn').style.display = 'inline-block';
        
        finalScoreEl.innerText = `You scored ${score} out of ${quizData.length}.`;
        
        const percentage = (score / quizData.length) * 100;
        if (percentage >= 80) {
            scoreMessageEl.innerHTML = "<strong>Excellent work!</strong> You have passed the Insider Threat security module. You are well-equipped to keep our organization safe.";
            scoreMessageEl.style.color = "#28a745";
        } else {
            scoreMessageEl.innerHTML = "<strong>Training Required.</strong> You did not meet the required 80% passing grade. Please review the material and retake the quiz.";
            scoreMessageEl.style.color = "#dc3545";
        }
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        quizBlock.style.display = 'block';
        scoreContainer.style.display = 'none';
        loadQuestion();
    }

    // Initialize the first question
    loadQuestion();
</script>

</body>
</html>
